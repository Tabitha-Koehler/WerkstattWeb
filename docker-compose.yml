services:

  db:
    image: postgres:16-alpine
    container_name: werkstattweb-db
    environment:
      POSTGRES_DB: werkstattweb
      POSTGRES_USER: werkstatt
      POSTGRES_PASSWORD: werkstatt2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - werkstatt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werkstatt -d werkstattweb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: werkstattweb-backend
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: werkstatt
      DB_PASSWORD: werkstatt2024
      DB_NAME: werkstattweb
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_ENABLED: "false"
      WATCH_FOLDER: /data/rechnungen_pdf
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - C:\Users\Tabitha\Desktop\Reparaturrechnungen:/data/rechnungen_pdf:ro
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - werkstatt-net
    restart: unless-stopped
    extra_hosts:
      - "host-gateway:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: werkstattweb-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - werkstatt-net
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:

networks:
  werkstatt-net:
    driver: bridge
