services:
  postgres:
    image: postgres:16-alpine
    container_name: werkstattweb-db
    environment:
      POSTGRES_DB: werkstattweb
      POSTGRES_USER: werkstatt
      POSTGRES_PASSWORD: werkstatt2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: werkstattweb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@werkstatt.de
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
