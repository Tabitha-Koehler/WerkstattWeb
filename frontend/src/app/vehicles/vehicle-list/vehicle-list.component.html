<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">Fahrzeuge</h1>
    <button class="btn-primary" (click)="openDialog()">➕ Fahrzeug hinzufügen</button>
  </div>

  <div *ngIf="errorMsg" class="warning-banner">⚠️ {{ errorMsg }}</div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading" class="card p-0 overflow-hidden">
    <table class="table-auto w-full">
      <thead><tr>
        <th>Kennzeichen</th><th>Typ</th><th>Hersteller</th><th>Modell</th><th>Baujahr</th><th></th>
      </tr></thead>
      <tbody>
        <tr *ngFor="let v of vehicles" (click)="goToDetail(v)">
          <td><span class="font-bold text-blue-700">{{ v.licensePlate }}</span></td>
          <td>{{ v.vehicleType ?? '–' }}</td>
          <td>{{ v.manufacturer ?? '–' }}</td>
          <td>{{ v.model ?? '–' }}</td>
          <td>{{ v.year ?? '–' }}</td>
          <td class="text-right" (click)="$event.stopPropagation()">
            <button class="btn-icon" (click)="openDialog(v)" title="Bearbeiten">✏️</button>
            <button class="btn-icon" (click)="delete(v, $event)" title="Löschen">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="vehicles.length === 0" class="py-16 text-center text-gray-400">
      <div class="text-4xl mb-3">🚛</div>
      <p>Noch keine Fahrzeuge. Rechnungen werden automatisch erkannt.</p>
    </div>
  </div>
</div>

<!-- Dialog -->
<app-vehicle-dialog
  *ngIf="dialogOpen"
  [vehicle]="editingVehicle"
  (saved)="onSaved($event)"
  (cancel)="dialogOpen = false">
</app-vehicle-dialog>
