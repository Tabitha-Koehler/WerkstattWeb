<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
  <h2 style="margin:0; color:#1565c0;">Fahrzeuge</h2>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon> Fahrzeug hinzufügen
  </button>
</div>

<div *ngIf="loading" style="text-align:center; padding:40px;">
  <mat-spinner diameter="40" style="margin:auto;"></mat-spinner>
</div>

<mat-card *ngIf="!loading">
  <mat-card-content style="padding:0;">
    <table mat-table [dataSource]="vehicles" style="width:100%;">

      <ng-container matColumnDef="licensePlate">
        <th mat-header-cell *matHeaderCellDef>Kennzeichen</th>
        <td mat-cell *matCellDef="let v">
          <strong style="font-size:15px;">{{ v.licensePlate }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="vehicleType">
        <th mat-header-cell *matHeaderCellDef>Typ</th>
        <td mat-cell *matCellDef="let v">{{ v.vehicleType ?? '–' }}</td>
      </ng-container>

      <ng-container matColumnDef="manufacturer">
        <th mat-header-cell *matHeaderCellDef>Hersteller</th>
        <td mat-cell *matCellDef="let v">{{ v.manufacturer ?? '–' }}</td>
      </ng-container>

      <ng-container matColumnDef="model">
        <th mat-header-cell *matHeaderCellDef>Modell</th>
        <td mat-cell *matCellDef="let v">{{ v.model ?? '–' }}</td>
      </ng-container>

      <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef>Baujahr</th>
        <td mat-cell *matCellDef="let v">{{ v.year ?? '–' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let v">
          <button mat-icon-button (click)="openDialog(v); $event.stopPropagation()" matTooltip="Bearbeiten">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(v, $event)" matTooltip="Löschen">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          class="clickable-row" (click)="goToDetail(row)"></tr>
    </table>

    <div *ngIf="vehicles.length === 0" style="padding:32px; text-align:center; color:#9e9e9e;">
      <mat-icon style="font-size:48px; width:48px; height:48px;">local_shipping</mat-icon>
      <p>Noch keine Fahrzeuge. Rechnungen werden automatisch erkannt.</p>
    </div>
  </mat-card-content>
</mat-card>
