<mat-sidenav-container class="sidenav-container">

  <mat-sidenav #sidenav mode="side" opened class="sidenav" fixedInViewport>
    <div style="padding: 16px 16px 8px; border-bottom: 1px solid #e0e0e0; margin-bottom: 8px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <mat-icon color="primary" style="font-size:28px; width:28px; height:28px;">local_shipping</mat-icon>
        <span style="font-size:18px; font-weight:500; color:#1565c0;">WerkstattWeb</span>
      </div>
      <div style="font-size:11px; color:#757575; margin-top:4px; padding-left:36px;">Spedition Rechnungsverwaltung</div>
    </div>

    <mat-nav-list>
      <a mat-list-item
         *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         style="border-radius:4px; margin: 2px 8px; display:block;">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" style="position:sticky; top:0; z-index:100;">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span style="margin-left:8px;">WerkstattWeb</span>
      <span class="spacer"></span>
      <button mat-icon-button routerLink="/upload" matTooltip="Rechnung hochladen">
        <mat-icon>upload_file</mat-icon>
      </button>
    </mat-toolbar>

    <div style="padding: 24px;">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
