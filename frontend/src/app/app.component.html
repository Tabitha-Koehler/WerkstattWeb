<div class="flex h-screen bg-gray-50">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col shrink-0">
    <div class="px-5 py-4 border-b border-gray-200">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🚛</span>
        <div>
          <div class="font-bold text-blue-700 text-base leading-tight">WerkstattWeb</div>
          <div class="text-xs text-gray-400">Spedition</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 py-3 px-2 space-y-1">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600
                hover:bg-gray-100 hover:text-gray-900 transition-colors">
        <span class="text-lg">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    </nav>

    <div class="p-3 border-t border-gray-200">
      <a routerLink="/upload"
         class="flex items-center gap-2 w-full px-3 py-2 text-sm bg-blue-700 text-white
                rounded-lg hover:bg-blue-800 transition-colors justify-center font-medium">
        <span>⬆️</span> Rechnung hochladen
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 shrink-0">
      <span class="text-gray-400 text-sm">WerkstattWeb – Spedition Rechnungsverwaltung</span>
    </header>

    <!-- Page -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
