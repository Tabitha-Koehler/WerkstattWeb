<div class="flex h-screen overflow-hidden" style="background:var(--surface-bg)">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="w-60 flex flex-col shrink-0 transition-colors duration-200"
         style="background:var(--surface-sidebar); border-right:1px solid var(--surface-sidebar-border)">

    <!-- Portal Switcher -->
    <div style="position:relative">
      <div class="flex items-center justify-between border-b" style="border-color:var(--surface-sidebar-border); padding:0.75rem 1rem;">
        <button (click)="portalOpen = !portalOpen"
                class="flex items-center gap-2 flex-1 min-w-0"
                style="background:none;border:none;cursor:pointer;padding:0;">
          <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center overflow-hidden shrink-0">
            <img src="assets/ck-logo.png" alt="CK" style="width:32px;height:32px;object-fit:contain;">
          </div>
          <div class="flex-1 min-w-0 text-left">
            <p class="text-sm font-bold leading-tight" style="color:var(--surface-text)">Cargo Köhler</p>
            <p class="text-xs font-medium text-green-400 flex items-center gap-1">
              Werkstatt
              <i class="fa-solid fa-chevron-down text-xs transition-transform"
                 [style.transform]="portalOpen ? 'rotate(180deg)' : 'rotate(0deg)'"></i>
            </p>
          </div>
        </button>
      </div>

      <!-- Dropdown -->
      @if (portalOpen) {
        <div style="position:fixed;inset:0;z-index:99;" (click)="portalOpen=false"></div>
        <div style="position:absolute;top:100%;left:0.5rem;right:0.5rem;z-index:100;margin-top:0.25rem;">
          <div class="rounded-xl shadow-xl overflow-hidden p-1.5"
               style="background:#1f2937;border:1px solid #374151;">
            <p class="px-2 py-1 text-xs font-medium uppercase tracking-wider" style="color:#6b7280;">Portal wechseln</p>
            @for (p of portals; track p.id) {
              @if (p.href) {
                <a [href]="p.href"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium no-underline"
                   style="color:#d1d5db;"
                   onmouseover="this.style.background='#374151';this.style.color='white'"
                   onmouseout="this.style.background='transparent';this.style.color='#d1d5db'">
                  <i class="fa-solid {{ p.icon }} w-4 text-center"></i>
                  <span>{{ p.label }}</span>
                </a>
              } @else {
                <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white"
                     style="background:#16a34a;">
                  <i class="fa-solid {{ p.icon }} w-4 text-center"></i>
                  <span class="flex-1">{{ p.label }}</span>
                  <i class="fa-solid fa-check"></i>
                </div>
              }
            }
          </div>
        </div>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-4 px-3 space-y-0.5 overflow-y-auto">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="nav-active"
           class="nav-item">
          <i class="fa-solid {{ item.icon }} w-4 text-center text-sm shrink-0"></i>
          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Bottom -->
    <div class="p-3 border-t space-y-2" style="border-color:var(--surface-sidebar-border)">

      <!-- Theme toggle -->
      <button class="flex items-center gap-3 w-full px-3 py-2 rounded-lg text-sm transition-colors"
              style="color:var(--surface-sidebar-muted); background:transparent; border:0; cursor:pointer;"
              (click)="theme.toggle()"
              [title]="theme.isDark() ? 'Light Mode aktivieren' : 'Dark Mode aktivieren'">
        <i class="fa-solid text-base w-5 text-center"
           [class]="theme.isDark() ? 'fa-sun' : 'fa-moon'"></i>
        <span class="font-medium text-sm">{{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}</span>
        <div class="ml-auto w-9 h-5 rounded-full transition-colors relative"
             [style.background]="theme.isDark() ? '#3b82f6' : '#cbd5e1'">
          <div class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform"
               [style.transform]="theme.isDark() ? 'translateX(1.125rem)' : 'translateX(0.125rem)'"></div>
        </div>
      </button>

      <!-- Upload shortcut -->
      <a routerLink="/upload"
         class="flex items-center justify-center gap-2 w-full px-3 py-2.5 text-sm font-semibold
                bg-blue-600 text-white rounded-xl hover:bg-blue-700 active:bg-blue-800
                transition-colors shadow-sm no-underline">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>Rechnung hochladen</span>
      </a>
    </div>
  </aside>

  <!-- ── Main area ───────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Topbar -->
    <header class="flex items-center justify-between px-6 py-3.5 border-b shrink-0 transition-colors duration-200"
            style="background:var(--surface-card); border-color:var(--surface-border)">
      <div class="flex items-center gap-2" style="color:var(--surface-muted)">
        <i class="fa-solid fa-truck-moving text-sm"></i>
        <span class="text-sm">Spedition Rechnungsverwaltung</span>
      </div>
      <div class="flex items-center gap-3">
        <p-toast />
        <p-confirmDialog />
        <span class="text-xs px-2.5 py-1 rounded-full font-semibold"
              style="background:var(--surface-hover); color:var(--surface-muted)">
          v2.0
        </span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
